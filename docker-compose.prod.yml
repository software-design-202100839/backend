# 프로덕션 Docker Compose (EC2 배포용)
#
# 사용법:
#   IMAGE_TAG=<git-sha> docker compose -f docker-compose.prod.yml up -d
#
# 필수 환경변수 파일: .env.prod  (EC2 서버에만 존재, 버전관리 제외)
# 예시 항목: DB_PASSWORD, JWT_SECRET, AWS_ACCESS_KEY_ID 등
#
# ECR 이미지 경로: 516232034601.dkr.ecr.ap-northeast-2.amazonaws.com/sscm-backend

services:
  # ── Nginx (Reverse Proxy) ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sscm-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Spring Boot Backend ────────────────────────────────────────────────────
  backend:
    image: 516232034601.dkr.ecr.ap-northeast-2.amazonaws.com/sscm-backend:${IMAGE_TAG:-latest}
    container_name: sscm-backend
    env_file: .env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-sscm}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-sscm}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sscm-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-sscm}
      POSTGRES_USER: ${DB_USER:-sscm}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sscm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sscm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus-prod.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sscm-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  grafana-data:
