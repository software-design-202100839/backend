spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:sscm}
    username: ${DB_USERNAME:sscm}
    password: ${DB_PASSWORD:sscm1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

encryption:
  key: ${ENCRYPTION_KEY:c3NjbS1kZXYtZW5jcnlwdGlvbi1rZXktMzItYnl0ZXM=}

jwt:
  secret: ${JWT_SECRET:sscm-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics

dev:
  seed:
    admin:
      password: ${DEV_SEED_ADMIN_PASSWORD}

logging:
  level:
    com.sscm: DEBUG
    org.springframework.security: DEBUG
