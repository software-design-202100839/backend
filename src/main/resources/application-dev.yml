spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sscm
    username: sscm
    password: sscm1234
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

encryption:
  key: c3NjbS1kZXYtZW5jcnlwdGlvbi1rZXktMzItYnl0ZXM=

jwt:
  secret: sscm-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics

logging:
  level:
    com.sscm: DEBUG
    org.springframework.security: DEBUG
