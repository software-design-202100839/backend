name: CI (Test + SonarCloud)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    env:
      DB_USERNAME: sscm
      DB_PASSWORD: sscm1234
      ENCRYPTION_KEY: c3NjbS1kZXYtZW5jcnlwdGlvbi1rZXktMzItYnl0ZXM=
      JWT_SECRET: sscm-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      DEV_SEED_ADMIN_PASSWORD: ${{ secrets.DEV_SEED_ADMIN_PASSWORD }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sscm
          POSTGRES_USER: sscm
          POSTGRES_PASSWORD: sscm1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sscm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Test + JaCoCo + SonarCloud
        run: ./gradlew jacocoTestReport sonar --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: dev
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
